# Docker Compose for AgriVisionTalk Backend
# Includes PostgreSQL, Redis, and Backend API

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: agrivision_db
    environment:
      POSTGRES_USER: agrivision
      POSTGRES_PASSWORD: agrivision123
      POSTGRES_DB: agrivision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrivision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrivision_network

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: agrivision_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrivision_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrivision_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agrivision:agrivision123@postgres:5432/agrivision_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ../p1/models:/app/models  # Mount trained model
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrivision_network
    command: >
      sh -c "
        python scripts/init_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
  redis_data:

networks:
  agrivision_network:
    driver: bridge
